name: Issue Pipeline

on:
  issues:
    types: [opened, labeled, closed]

# Prevent concurrent runs for the same issue
concurrency:
  group: issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  # ── New issue opened: create Devin triage session ──
  # The triage playbook handles labels, reactions, welcome comment, analysis,
  # user conversation, and the handoff to implementation (by adding
  # devin:implement when the user approves). GHA just creates the session.
  auto-triage-on-open:
    if: >-
      github.event.action == 'opened' &&
      !contains(github.event.issue.labels.*.name, 'devin:skip') &&
      !contains(github.event.issue.labels.*.name, 'devin:triage') &&
      !contains(github.event.issue.labels.*.name, 'devin:triaged') &&
      !contains(github.event.issue.labels.*.name, 'devin:implement') &&
      !contains(github.event.issue.labels.*.name, 'devin:pr-in-progress') &&
      !contains(github.event.issue.labels.*.name, 'devin:pr-ready') &&
      !contains(github.event.issue.labels.*.name, 'devin:done') &&
      !contains(github.event.issue.labels.*.name, 'devin:escalated')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create triage session
        id: session
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          TRIAGE_PLAYBOOK_ID: ${{ vars.TRIAGE_PLAYBOOK_ID }}
          ACU_LIMIT_TRIAGE: ${{ vars.ACU_LIMIT_TRIAGE }}
        run: |
          issue=${{ github.event.issue.number }}
          repo=${{ github.repository }}
          title=$(jq -r '.issue.title // ""' "$GITHUB_EVENT_PATH" | head -c 500)
          body=$(jq -r '.issue.body // ""' "$GITHUB_EVENT_PATH" | head -c 5000)

          prompt="Triage GitHub issue #${issue} on ${repo}.

          ## Issue #${issue}: ${title}

          ${body}

          **Repository:** ${repo}
          **Issue URL:** https://github.com/${repo}/issues/${issue}"

          payload=$(jq -n \
            --arg prompt "$prompt" \
            --arg playbook_id "${TRIAGE_PLAYBOOK_ID:-}" \
            --argjson max_acu "${ACU_LIMIT_TRIAGE:-25}" \
            --arg tag1 "backlog-auto" \
            --arg tag2 "issue:${issue}" \
            --arg tag3 "stage:triage" \
            --arg tag4 "repo:${repo}" \
            '{
              prompt: $prompt,
              tags: [$tag1, $tag2, $tag3, $tag4],
              max_acu_limit: $max_acu
            } + (if $playbook_id != "" then {playbook_id: $playbook_id} else {} end)')

          # Retry loop with backoff for 429 (concurrent session limit)
          max_retries=3
          delays=(60 120 180)
          for attempt in $(seq 0 $max_retries); do
            response=$(curl -s -w "\n%{http_code}" \
              -X POST "https://api.devin.ai/v1/sessions" \
              -H "Authorization: Bearer ${DEVIN_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$payload")

            http_code=$(echo "$response" | tail -1)
            resp_body=$(echo "$response" | sed '$d')

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              echo "session_created=true" >> "$GITHUB_OUTPUT"
              echo "Session created successfully"
              break
            elif [ "$http_code" -eq 429 ] && [ "$attempt" -lt "$max_retries" ]; then
              echo "::warning::Session creation returned 429 (attempt $((attempt+1))/$((max_retries+1))). Retrying in ${delays[$attempt]}s..."
              sleep "${delays[$attempt]}"
            else
              echo "session_created=false" >> "$GITHUB_OUTPUT"
              echo "::error::Failed to create triage session: HTTP ${http_code} (after $((attempt+1)) attempt(s))"
              break
            fi
          done

  # ── Manual devin:triage label added (via UI or /triage command) ──
  start-triage-on-label:
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'devin:triage' &&
      github.event.sender.login != 'devin-ai-integration[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check for existing active session
        id: check
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
        run: |
          issue=${{ github.event.issue.number }}

          response=$(curl -s \
            -X GET "https://api.devin.ai/v1/sessions" \
            -H "Authorization: Bearer ${DEVIN_API_KEY}" \
            -G --data-urlencode "tags=backlog-auto" \
            --data-urlencode "tags=issue:${issue}" \
            --data-urlencode "limit=100")

          # Check for any active session (status: running, new, claimed, resuming, suspended)
          active_url=$(echo "$response" | jq -r '
            [.sessions[] | select(.status as $s |
              ["running","new","claimed","resuming","suspended"] | index($s))] |
            first | .url // empty')

          if [ -n "$active_url" ]; then
            echo "has_active=true" >> "$GITHUB_OUTPUT"
            echo "active_session_url=${active_url}" >> "$GITHUB_OUTPUT"
          else
            echo "has_active=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — active session already exists
        if: steps.check.outputs.has_active == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "Skipping triage — an active Devin session already exists."

      - name: Create triage session
        if: steps.check.outputs.has_active != 'true'
        id: session
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          TRIAGE_PLAYBOOK_ID: ${{ vars.TRIAGE_PLAYBOOK_ID }}
          ACU_LIMIT_TRIAGE: ${{ vars.ACU_LIMIT_TRIAGE }}
        run: |
          issue=${{ github.event.issue.number }}
          repo=${{ github.repository }}
          title=$(jq -r '.issue.title // ""' "$GITHUB_EVENT_PATH" | head -c 500)
          body=$(jq -r '.issue.body // ""' "$GITHUB_EVENT_PATH" | head -c 5000)

          prompt="Triage GitHub issue #${issue} on ${repo}.

          ## Issue #${issue}: ${title}

          ${body}

          **Repository:** ${repo}
          **Issue URL:** https://github.com/${repo}/issues/${issue}"

          payload=$(jq -n \
            --arg prompt "$prompt" \
            --arg playbook_id "${TRIAGE_PLAYBOOK_ID:-}" \
            --argjson max_acu "${ACU_LIMIT_TRIAGE:-25}" \
            --arg tag1 "backlog-auto" \
            --arg tag2 "issue:${issue}" \
            --arg tag3 "stage:triage" \
            --arg tag4 "repo:${repo}" \
            '{
              prompt: $prompt,
              tags: [$tag1, $tag2, $tag3, $tag4],
              max_acu_limit: $max_acu
            } + (if $playbook_id != "" then {playbook_id: $playbook_id} else {} end)')

          # Retry loop with backoff for 429 (concurrent session limit)
          max_retries=3
          delays=(60 120 180)
          for attempt in $(seq 0 $max_retries); do
            response=$(curl -s -w "\n%{http_code}" \
              -X POST "https://api.devin.ai/v1/sessions" \
              -H "Authorization: Bearer ${DEVIN_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$payload")

            http_code=$(echo "$response" | tail -1)
            resp_body=$(echo "$response" | sed '$d')

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              echo "session_created=true" >> "$GITHUB_OUTPUT"
              echo "Session created successfully"
              break
            elif [ "$http_code" -eq 429 ] && [ "$attempt" -lt "$max_retries" ]; then
              echo "::warning::Session creation returned 429 (attempt $((attempt+1))/$((max_retries+1))). Retrying in ${delays[$attempt]}s..."
              sleep "${delays[$attempt]}"
            else
              echo "session_created=false" >> "$GITHUB_OUTPUT"
              echo "::error::Failed to create triage session: HTTP ${http_code} (after $((attempt+1)) attempt(s))"
              break
            fi
          done

      - name: Remove label — session creation failed
        if: always() && steps.check.outputs.has_active != 'true' && steps.session.outputs.session_created != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --remove-label "devin:triage" 2>/dev/null || true

  # ── devin:implement label added (via UI, slash command, or triage handoff) ──
  start-implement-on-label:
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'devin:implement'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Terminate previous sessions for this issue
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
        run: |
          issue=${{ github.event.issue.number }}

          response=$(curl -s \
            -X GET "https://api.devin.ai/v1/sessions" \
            -H "Authorization: Bearer ${DEVIN_API_KEY}" \
            -G --data-urlencode "tags=backlog-auto" \
            --data-urlencode "tags=issue:${issue}" \
            --data-urlencode "limit=100")

          # Terminate all active sessions (e.g. lingering triage sessions)
          echo "$response" | jq -r '
            [.sessions[] | select(.status as $s |
              ["running","new","claimed","resuming","suspended"] | index($s))] |
            .[].session_id' | while IFS= read -r session_id; do
            if [ -n "$session_id" ]; then
              echo "Terminating previous session ${session_id}..."
              curl -s -X DELETE "https://api.devin.ai/v1/sessions/${session_id}" \
                -H "Authorization: Bearer ${DEVIN_API_KEY}" || true
            fi
          done

      - name: Create implement session
        id: session
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          IMPLEMENT_PLAYBOOK_ID: ${{ vars.IMPLEMENT_PLAYBOOK_ID }}
          ACU_LIMIT_IMPLEMENT: ${{ vars.ACU_LIMIT_IMPLEMENT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          issue=${{ github.event.issue.number }}
          repo=${{ github.repository }}

          # Fetch full issue context including comments (for triage analysis)
          context=$(gh issue view "${issue}" \
            --repo "${repo}" \
            --json title,body,labels,comments)

          title=$(echo "$context" | jq -r '.title // ""' | head -c 500)
          body=$(echo "$context" | jq -r '.body // ""' | head -c 5000)
          labels=$(echo "$context" | jq -r '[.labels[].name] | join(", ")')
          comments=$(echo "$context" | jq -r '
            .comments[] |
            "### Comment by @\(.author.login)\n\(.body)\n"' 2>/dev/null || echo "")

          prompt="Implement a fix for GitHub issue #${issue} on ${repo}.

          ## Issue #${issue}: ${title}

          ${body}

          **Labels:** ${labels}
          **Repository:** ${repo}
          **Issue URL:** https://github.com/${repo}/issues/${issue}"

          if [ -n "$comments" ]; then
            prompt="${prompt}

          ## Comments (includes triage analysis and human feedback)
          ${comments}"
          fi

          payload=$(jq -n \
            --arg prompt "$prompt" \
            --arg playbook_id "${IMPLEMENT_PLAYBOOK_ID:-}" \
            --argjson max_acu "${ACU_LIMIT_IMPLEMENT:-50}" \
            --arg tag1 "backlog-auto" \
            --arg tag2 "issue:${issue}" \
            --arg tag3 "stage:implement" \
            --arg tag4 "repo:${repo}" \
            '{
              prompt: $prompt,
              tags: [$tag1, $tag2, $tag3, $tag4],
              max_acu_limit: $max_acu
            } + (if $playbook_id != "" then {playbook_id: $playbook_id} else {} end)')

          # Retry loop with backoff for 429 (concurrent session limit)
          max_retries=3
          delays=(60 120 180)
          for attempt in $(seq 0 $max_retries); do
            response=$(curl -s -w "\n%{http_code}" \
              -X POST "https://api.devin.ai/v1/sessions" \
              -H "Authorization: Bearer ${DEVIN_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$payload")

            http_code=$(echo "$response" | tail -1)
            resp_body=$(echo "$response" | sed '$d')

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              echo "session_created=true" >> "$GITHUB_OUTPUT"
              echo "Session created successfully"
              break
            elif [ "$http_code" -eq 429 ] && [ "$attempt" -lt "$max_retries" ]; then
              echo "::warning::Session creation returned 429 (attempt $((attempt+1))/$((max_retries+1))). Retrying in ${delays[$attempt]}s..."
              sleep "${delays[$attempt]}"
            else
              echo "session_created=false" >> "$GITHUB_OUTPUT"
              echo "::error::Failed to create implement session: HTTP ${http_code} (after $((attempt+1)) attempt(s))"
              break
            fi
          done

      - name: Revert to triaged — session creation failed
        if: always() && steps.session.outputs.session_created != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --remove-label "devin:implement" \
            --add-label "devin:triaged" 2>/dev/null || true

  # ── Issue closed externally: terminate active session, clean up labels ──
  cleanup-on-close:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check for active devin labels
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          labels=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json labels -q '.labels[].name')
          has_devin=false
          is_done=false
          while IFS= read -r label; do
            if [[ "$label" == devin:* ]]; then
              has_devin=true
              if [[ "$label" == "devin:done" ]]; then
                is_done=true
              fi
            fi
          done <<< "$labels"
          echo "has_devin_labels=$has_devin" >> "$GITHUB_OUTPUT"
          echo "is_done=$is_done" >> "$GITHUB_OUTPUT"

      - name: Terminate active session
        if: steps.check.outputs.has_devin_labels == 'true' && steps.check.outputs.is_done != 'true'
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
        run: |
          issue=${{ github.event.issue.number }}

          # Find active session
          response=$(curl -s \
            -X GET "https://api.devin.ai/v1/sessions" \
            -H "Authorization: Bearer ${DEVIN_API_KEY}" \
            -G --data-urlencode "tags=backlog-auto" \
            --data-urlencode "tags=issue:${issue}" \
            --data-urlencode "limit=100")

          session_id=$(echo "$response" | jq -r '
            [.sessions[] | select(.status as $s |
              ["running","new","claimed","resuming","suspended"] | index($s))] |
            first | .session_id // empty')

          if [ -n "$session_id" ]; then
            curl -s -X DELETE "https://api.devin.ai/v1/sessions/${session_id}" \
              -H "Authorization: Bearer ${DEVIN_API_KEY}" || true
            echo "Terminated session ${session_id}"
          else
            echo "No active session found for issue #${issue}"
          fi

      - name: Remove devin labels
        if: steps.check.outputs.has_devin_labels == 'true' && steps.check.outputs.is_done != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json labels -q '.labels[].name' | while IFS= read -r label; do
            if [[ "$label" == devin:* ]]; then
              gh issue edit ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --remove-label "$label" 2>/dev/null || true
            fi
          done
