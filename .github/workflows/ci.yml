name: CI

on:
  pull_request:
    branches: [main]

jobs:
  python-checks:
    name: Python Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check services/ shared/

      - name: Run Python tests
        run: |
          PYTHONPATH=. pytest services/ --tb=short -q

  frontend-checks:
    name: Frontend Lint, Typecheck & Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint (errors only)
        run: npx eslint . --ext ts,tsx --report-unused-disable-directives --quiet

      - name: Run tests
        run: npm run test
