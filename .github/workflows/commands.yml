name: Slash Commands

on:
  issue_comment:
    types: [created]

# Prevent concurrent runs for the same issue
concurrency:
  group: issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  process-comment:
    # Only run on issue comments (not PR comments), ignore bot comments
    if: >-
      !github.event.issue.pull_request &&
      github.event.comment.user.login != 'github-actions[bot]' &&
      github.event.comment.user.login != 'devin-ai-integration[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Parse command
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          command=$(echo "$COMMENT_BODY" | head -1 | awk '{print $1}' | tr '[:upper:]' '[:lower:]')
          if [[ "$command" == /* ]]; then
            echo "is_command=true" >> "$GITHUB_OUTPUT"
            echo "command=$command" >> "$GITHUB_OUTPUT"
          else
            echo "is_command=false" >> "$GITHUB_OUTPUT"
            echo "command=" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx pydantic

      - name: Ensure devin labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for label in devin:triage devin:triaged devin:implement devin:pr-opened devin:done devin:escalated devin:skip; do
            gh label create "$label" --repo ${{ github.repository }} --color ededed --force 2>/dev/null || true
          done

      # -- /proceed or /sgtm: swap devin:triaged -> devin:implement + create session --
      - name: Handle /proceed
        if: steps.parse.outputs.command == '/proceed' || steps.parse.outputs.command == '/sgtm'
        id: proceed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          IMPLEMENT_PLAYBOOK_ID: ${{ vars.IMPLEMENT_PLAYBOOK_ID }}
          ACU_LIMIT_IMPLEMENT: ${{ vars.ACU_LIMIT_IMPLEMENT }}
        run: |
          labels=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json labels -q '.labels[].name')

          if echo "$labels" | grep -q "^devin:triaged$"; then
            # Check if a session (e.g. triage) is still active
            python automation/devin_api.py check-active-session \
              --issue ${{ github.event.issue.number }}
            has_active=$(grep 'has_active=' "$GITHUB_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || echo "false")

            if [ "$has_active" = "true" ]; then
              # Triage still running — tell Devin to proceed to implement
              # when it finishes. Devin will add the devin:implement label
              # itself, which triggers implement.yml.
              active_url=$(grep 'active_session_url=' "$GITHUB_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || true)
              echo "The user has approved implementation. When you finish triaging, swap the label to devin:implement (instead of devin:triaged) so implementation starts automatically." > /tmp/proceed_msg.txt
              python automation/devin_api.py forward-comment \
                --issue ${{ github.event.issue.number }} \
                --author "${{ github.event.comment.user.login }}" \
                --body-file /tmp/proceed_msg.txt
              gh issue comment ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --body "Noted — triage is still in progress (${active_url:-session link unavailable}). Implementation will start automatically once triage completes."
              exit 0
            fi

            # No active session — proceed immediately
            # Swap labels
            gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --remove-label "devin:triaged" \
              --add-label "devin:implement"

            # Add eyes reaction
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions \
              -f content=eyes --silent || true

            # Fetch context and create implement session
            gh issue view ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --json title,body,labels,comments > /tmp/issue_context.json

            python automation/devin_api.py create-session \
              --stage implement \
              --issue ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --context-file /tmp/issue_context.json

            # Check if session creation succeeded
            created=$(grep 'session_created=' "$GITHUB_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || echo "false")
            if [ "$created" = "true" ]; then
              session_url=$(grep 'session_url=' "$GITHUB_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || true)
              if [ -n "$session_url" ]; then
                cat <<'COMMENT' | sed "s|SESSION_URL|$session_url|g" > /tmp/implement_comment.md
                ### Devin AI Engineer

                I'm implementing the changes for this issue now. Here's what to expect:

                **I will automatically:**
                - Implement the solution based on the triage analysis
                - Open a pull request when implementation is complete
                - Update the issue with the `devin:pr-opened` label

                **Available commands:**
                - `/close` — Close the issue and terminate the session
                - `/skip` — Skip this issue (stops Devin)
                - `/retriage` — Go back to triage
                - Any other comment will be forwarded to the active Devin session

                **Devin session:** SESSION_URL
                COMMENT
                sed -i 's/^                //' /tmp/implement_comment.md
                gh issue comment ${{ github.event.issue.number }} \
                  --repo ${{ github.repository }} \
                  --body-file /tmp/implement_comment.md
              fi
            else
              # Rollback: restore devin:triaged, remove devin:implement
              session_error=$(grep 'session_error=' "$GITHUB_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || true)
              gh issue edit ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --remove-label "devin:implement" \
                --add-label "devin:triaged" 2>/dev/null || true
              gh issue comment ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --body "Failed to create Devin implement session: ${session_error:-unknown error}. Labels have been restored. You can retry with \`/proceed\`."
            fi
          else
            gh issue comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body "Cannot proceed — issue is not in \`devin:triaged\` state."
          fi

      # -- /close: terminate active session, remove labels, close issue --
      - name: Handle /close
        if: steps.parse.outputs.command == '/close'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
        run: |
          python automation/devin_api.py terminate-active \
            --issue ${{ github.event.issue.number }}

          gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json labels -q '.labels[].name' | while IFS= read -r label; do
            if [[ "$label" == devin:* ]]; then
              gh issue edit ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --remove-label "$label" 2>/dev/null || true
            fi
          done

          gh issue close ${{ github.event.issue.number }} \
            --repo ${{ github.repository }}

      # -- /skip: terminate active session, remove labels, add devin:skip --
      - name: Handle /skip
        if: steps.parse.outputs.command == '/skip'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
        run: |
          python automation/devin_api.py terminate-active \
            --issue ${{ github.event.issue.number }}

          gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json labels -q '.labels[].name' | while IFS= read -r label; do
            if [[ "$label" == devin:* ]]; then
              gh issue edit ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --remove-label "$label" 2>/dev/null || true
            fi
          done

          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-label "devin:skip"

      # -- /triage: add devin:triage + create session (if no devin label present) --
      - name: Handle /triage
        if: steps.parse.outputs.command == '/triage'
        id: triage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          TRIAGE_PLAYBOOK_ID: ${{ vars.TRIAGE_PLAYBOOK_ID }}
          ACU_LIMIT_TRIAGE: ${{ vars.ACU_LIMIT_TRIAGE }}
        run: |
          labels=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json labels -q '.labels[].name')

          has_devin=$(echo "$labels" | grep "^devin:" || true)
          if [ -z "$has_devin" ]; then
            # Add label
            gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --add-label "devin:triage"

            # Add eyes reaction
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions \
              -f content=eyes --silent || true

            # Fetch context and create triage session
            gh issue view ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --json title,body,labels,comments > /tmp/issue_context.json

            python automation/devin_api.py create-session \
              --stage triage \
              --issue ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --context-file /tmp/issue_context.json

            # Check if session creation succeeded
            created=$(grep 'session_created=' "$GITHUB_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || echo "false")
            if [ "$created" = "true" ]; then
              session_url=$(grep 'session_url=' "$GITHUB_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || true)
              if [ -n "$session_url" ]; then
                cat <<'COMMENT' | sed "s|SESSION_URL|$session_url|g" > /tmp/triage_comment.md
                ### Devin AI Engineer

                I'm triaging this issue now. Here's what to expect:

                **I will automatically:**
                - Analyze the issue and assess scope, complexity, and approach
                - Post my triage findings as a comment when complete
                - Add the `devin:triaged` label when triage is done

                **Available commands:**
                - `/proceed` or `/sgtm` — Approve and start implementation
                - `/skip` — Skip this issue (stops Devin)
                - `/close` — Close the issue and terminate any active session
                - `/retriage` — Start triage over from scratch
                - Any other comment will be forwarded to the active Devin session

                **Devin session:** SESSION_URL
                COMMENT
                sed -i 's/^                //' /tmp/triage_comment.md
                gh issue comment ${{ github.event.issue.number }} \
                  --repo ${{ github.repository }} \
                  --body-file /tmp/triage_comment.md
              fi
            else
              # Rollback: remove devin:triage
              session_error=$(grep 'session_error=' "$GITHUB_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || true)
              gh issue edit ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --remove-label "devin:triage" 2>/dev/null || true
              gh issue comment ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --body "Failed to create Devin triage session: ${session_error:-unknown error}. The \`devin:triage\` label has been removed. You can retry with \`/triage\`."
            fi
          else
            gh issue comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body "Cannot /triage — issue already has a devin label."
          fi

      # -- /retriage: terminate active session, remove labels, re-triage --
      - name: Handle /retriage
        if: steps.parse.outputs.command == '/retriage'
        id: retriage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          TRIAGE_PLAYBOOK_ID: ${{ vars.TRIAGE_PLAYBOOK_ID }}
          ACU_LIMIT_TRIAGE: ${{ vars.ACU_LIMIT_TRIAGE }}
        run: |
          labels=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json labels -q '.labels[].name')

          if echo "$labels" | grep -q "^devin:skip$"; then
            gh issue comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body "Cannot /retriage — issue has \`devin:skip\` label."
            exit 0
          fi

          # Terminate active session before re-triaging
          python automation/devin_api.py terminate-active \
            --issue ${{ github.event.issue.number }}

          # Remove all devin labels
          echo "$labels" | while IFS= read -r label; do
            if [[ "$label" == devin:* ]]; then
              gh issue edit ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --remove-label "$label" 2>/dev/null || true
            fi
          done

          # Add devin:triage label
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-label "devin:triage"

          # Add eyes reaction
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions \
            -f content=eyes --silent || true

          # Fetch context and create triage session
          gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json title,body,labels,comments > /tmp/issue_context.json

          python automation/devin_api.py create-session \
            --stage triage \
            --issue ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --context-file /tmp/issue_context.json

          # Check if session creation succeeded
          created=$(grep 'session_created=' "$GITHUB_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || echo "false")
          if [ "$created" = "true" ]; then
            session_url=$(grep 'session_url=' "$GITHUB_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || true)
            if [ -n "$session_url" ]; then
              cat <<'COMMENT' | sed "s|SESSION_URL|$session_url|g" > /tmp/triage_comment.md
              ### Devin AI Engineer

              I'm triaging this issue now. Here's what to expect:

              **I will automatically:**
              - Analyze the issue and assess scope, complexity, and approach
              - Post my triage findings as a comment when complete
              - Add the `devin:triaged` label when triage is done

              **Available commands:**
              - `/proceed` or `/sgtm` — Approve and start implementation
              - `/skip` — Skip this issue (stops Devin)
              - `/close` — Close the issue and terminate any active session
              - `/retriage` — Start triage over from scratch
              - Any other comment will be forwarded to the active Devin session

              **Devin session:** SESSION_URL
              COMMENT
              sed -i 's/^              //' /tmp/triage_comment.md
              gh issue comment ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --body-file /tmp/triage_comment.md
            fi
          else
            # Rollback: remove devin:triage (previous session was already terminated)
            session_error=$(grep 'session_error=' "$GITHUB_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || true)
            gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --remove-label "devin:triage" 2>/dev/null || true
            gh issue comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body "Failed to create Devin triage session after retriage: ${session_error:-unknown error}. The previous session was already terminated. The \`devin:triage\` label has been removed. You can retry with \`/triage\` or \`/retriage\`."
          fi

      # -- Non-command comment (or unrecognized slash command): forward to active Devin session --
      - name: Forward comment to Devin session
        if: >-
          steps.parse.outputs.is_command != 'true' ||
          (steps.parse.outputs.command != '/proceed' &&
           steps.parse.outputs.command != '/sgtm' &&
           steps.parse.outputs.command != '/close' &&
           steps.parse.outputs.command != '/skip' &&
           steps.parse.outputs.command != '/triage' &&
           steps.parse.outputs.command != '/retriage')
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          printenv COMMENT_BODY > /tmp/comment_body.txt
          python automation/devin_api.py forward-comment \
            --issue ${{ github.event.issue.number }} \
            --author "${{ github.event.comment.user.login }}" \
            --body-file /tmp/comment_body.txt
