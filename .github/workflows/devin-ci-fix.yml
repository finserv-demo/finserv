name: Auto-fix CI with Devin

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  trigger-devin-fix:
    # Only trigger on CI failures for PRs
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.pull_requests[0]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx pydantic

      - name: Get failure details
        id: failure
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const pr = run.pull_requests[0];
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id
            });
            const failed = jobs.data.jobs
              .filter(j => j.conclusion === 'failure')
              .map(j => j.name);
            core.setOutput('pr_number', pr.number);
            core.setOutput('branch', pr.head.ref);
            core.setOutput('failed_jobs', failed.join(', '));
            core.setOutput('run_url', run.html_url);

      - name: Check for existing ci-fix session
        id: check
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
        run: |
          # Use the Devin API to check if a ci-fix session already exists for this PR
          python automation/devin_api.py check-active-session \
            --issue ${{ steps.failure.outputs.pr_number }}

      - name: Skip -- active session already exists
        if: steps.check.outputs.has_active == 'true'
        run: |
          echo "Skipping CI fix — an active Devin session already exists for PR #${{ steps.failure.outputs.pr_number }}: ${{ steps.check.outputs.active_session_url }}"

      - name: Trigger Devin CI fix session
        if: >
          steps.check.outputs.has_active != 'true' && (
            contains(steps.failure.outputs.failed_jobs, 'Lint') ||
            contains(steps.failure.outputs.failed_jobs, 'Test') ||
            contains(steps.failure.outputs.failed_jobs, 'Typecheck') ||
            contains(steps.failure.outputs.failed_jobs, 'Python') ||
            contains(steps.failure.outputs.failed_jobs, 'Frontend')
          )
        id: session
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          CI_FIX_PLAYBOOK_ID: ${{ vars.CI_FIX_PLAYBOOK_ID }}
          ACU_LIMIT_CI_FIX: ${{ vars.ACU_LIMIT_CI_FIX }}
          INPUT_BRANCH: ${{ steps.failure.outputs.branch }}
          INPUT_FAILED_JOBS: ${{ steps.failure.outputs.failed_jobs }}
          INPUT_RUN_URL: ${{ steps.failure.outputs.run_url }}
        run: |
          # Build context JSON safely using jq to avoid shell injection
          jq -n \
            --arg branch "$INPUT_BRANCH" \
            --arg failed_jobs "$INPUT_FAILED_JOBS" \
            --arg run_url "$INPUT_RUN_URL" \
            '{branch: $branch, failed_jobs: $failed_jobs, run_url: $run_url}' \
            > /tmp/ci_fix_context.json

          python automation/devin_api.py create-session \
            --stage ci-fix \
            --issue ${{ steps.failure.outputs.pr_number }} \
            --repo ${{ github.repository }} \
            --context-file /tmp/ci_fix_context.json

      - name: Comment on PR with session link
        if: steps.session.outputs.session_created == 'true' && steps.session.outputs.session_url
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.failure.outputs.pr_number }}
          FAILED_JOBS: ${{ steps.failure.outputs.failed_jobs }}
          RUN_URL: ${{ steps.failure.outputs.run_url }}
          SESSION_URL: ${{ steps.session.outputs.session_url }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo ${{ github.repository }} \
            --body "CI failed — Devin is investigating and will push a fix.

          **Failed jobs:** $FAILED_JOBS
          **CI run:** $RUN_URL
          **Devin session:** $SESSION_URL"

      - name: Comment on PR -- session creation failed
        if: steps.session.outputs.session_created == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.failure.outputs.pr_number }}
          SESSION_ERROR: ${{ steps.session.outputs.session_error }}
          FAILED_JOBS: ${{ steps.failure.outputs.failed_jobs }}
          RUN_URL: ${{ steps.failure.outputs.run_url }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo ${{ github.repository }} \
            --body "CI failed but could not start a Devin fix session: $SESSION_ERROR

          **Failed jobs:** $FAILED_JOBS
          **CI run:** $RUN_URL"
