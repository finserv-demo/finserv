name: Mark issue done on PR merge

on:
  pull_request:
    types: [closed]

jobs:
  mark-done:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Transition linked issues to devin:done
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';

            // Extract issue numbers from "Closes #N", "Fixes #N", "Resolves #N"
            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const issueNumbers = new Set();
            let match;
            while ((match = pattern.exec(prBody)) !== null) {
              issueNumbers.add(parseInt(match[1], 10));
            }

            if (issueNumbers.size === 0) {
              console.log('No linked issues found in PR body');
              return;
            }

            const devinStatusLabels = [
              'devin:triage',
              'devin:triaged',
              'devin:implement',
              'devin:pr-in-progress',
              'devin:pr-ready',
              'devin:escalated',
            ];

            for (const issueNumber of issueNumbers) {
              console.log(`Processing issue #${issueNumber}`);
              try {
                const issue = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                });

                const labels = issue.data.labels.map(l => l.name);
                const hasDevinLabel = labels.some(l => l.startsWith('devin:'));
                if (!hasDevinLabel) {
                  console.log(`Issue #${issueNumber} has no devin labels, skipping`);
                  continue;
                }

                // Remove old devin status labels
                for (const label of labels) {
                  if (devinStatusLabels.includes(label)) {
                    try {
                      await github.rest.issues.removeLabel({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: issueNumber,
                        name: label,
                      });
                      console.log(`Removed label ${label} from #${issueNumber}`);
                    } catch (e) {
                      console.log(`Failed to remove label ${label}: ${e.message}`);
                    }
                  }
                }

                // Add devin:done label
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: ['devin:done'],
                });
                console.log(`Added devin:done to #${issueNumber}`);

                // Close the issue if still open
                if (issue.data.state === 'open') {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    state: 'closed',
                  });
                  console.log(`Closed issue #${issueNumber}`);
                }

              } catch (e) {
                console.log(`Error processing issue #${issueNumber}: ${e.message}`);
              }
            }
