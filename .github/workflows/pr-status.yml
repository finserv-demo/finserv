name: PR Status Sync

# Automatically swap devin:pr-in-progress <-> devin:pr-ready based on
# review thread resolution status. CI status is NOT part of the label
# decision — it's displayed separately in the dashboard.
#
# pr-ready criteria (all three must be true):
#   1. At least one review has been submitted (any state)
#   2. Zero unresolved review threads (GraphQL reviewThreads)
#   3. No reviewer has CHANGES_REQUESTED as their latest state

on:
  check_suite:
    types: [completed]
  pull_request_review:
    types: [submitted, dismissed]
  issue_comment:
    types: [created]

jobs:
  sync-pr-label:
    # Only run for events related to pull requests
    if: >-
      (github.event_name == 'check_suite' && github.event.check_suite.pull_requests[0]) ||
      github.event_name == 'pull_request_review' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request)
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
      checks: read
    steps:
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "check_suite" ]; then
            pr_number="${{ github.event.check_suite.pull_requests[0].number }}"
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            pr_number="${{ github.event.pull_request.number }}"
          else
            pr_number="${{ github.event.issue.number }}"
          fi
          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"

          if [ -z "$pr_number" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find the linked issue number from the PR body (looks for "Closes #N" or "Fixes #N")
          pr_body=$(gh pr view "$pr_number" --repo "${{ github.repository }}" --json body -q '.body' 2>/dev/null || echo "")
          issue_number=$(echo "$pr_body" | grep -oiP '(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#\K\d+' | head -1 || true)

          if [ -z "$issue_number" ]; then
            echo "No linked issue found in PR #${pr_number}"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "issue_number=${issue_number}" >> "$GITHUB_OUTPUT"

          # Check if the issue has devin:pr-in-progress or devin:pr-ready
          labels=$(gh issue view "$issue_number" --repo "${{ github.repository }}" --json labels -q '.labels[].name' 2>/dev/null || echo "")
          has_in_progress=$(echo "$labels" | grep "^devin:pr-in-progress$" || true)
          has_ready=$(echo "$labels" | grep "^devin:pr-ready$" || true)

          if [ -z "$has_in_progress" ] && [ -z "$has_ready" ]; then
            echo "Issue #${issue_number} has neither pr-in-progress nor pr-ready label"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          if [ -n "$has_in_progress" ]; then
            echo "current_in_progress=true" >> "$GITHUB_OUTPUT"
          else
            echo "current_in_progress=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$has_ready" ]; then
            echo "current_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "current_ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check review status
        if: steps.pr.outputs.skip != 'true'
        id: status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          repo="${REPO_OWNER}/${REPO_NAME}"

          # ── Condition 1: At least one review submitted ──
          # Prevents race condition where a brand-new PR with 0 reviews
          # would vacuously satisfy "no unresolved threads"
          review_count=$(gh pr view "$PR_NUMBER" --repo "$repo" --json reviews -q '.reviews | length' 2>/dev/null || echo "0")
          has_any_review=$([ "$review_count" -gt 0 ] && echo true || echo false)

          # ── Condition 2: Zero unresolved review threads ──
          # Uses GraphQL to check review threads (inline code comments).
          # This is what Devin auto-review creates and auto-fix resolves.
          thread_data=$(gh api graphql -f query='
            query($owner: String!, $name: String!, $number: Int!) {
              repository(owner: $owner, name: $name) {
                pullRequest(number: $number) {
                  reviewThreads(first: 100) {
                    nodes {
                      isResolved
                      isOutdated
                    }
                    totalCount
                  }
                }
              }
            }' -f owner="$REPO_OWNER" -f name="$REPO_NAME" -F number="$PR_NUMBER" 2>/dev/null || echo '{}')

          unresolved_threads=$(echo "$thread_data" | jq '
            [.data.repository.pullRequest.reviewThreads.nodes[]
             | select(.isResolved == false)]
            | length' 2>/dev/null || echo "0")

          no_unresolved_threads=$([ "$unresolved_threads" -eq 0 ] && echo true || echo false)

          # ── Condition 3: No reviewer has CHANGES_REQUESTED as latest state ──
          # Secondary signal for human reviewers who submit top-level
          # CHANGES_REQUESTED without inline threads.
          changes_requested=$(gh pr view "$PR_NUMBER" --repo "$repo" --json reviews -q '
            [.reviews[] | select(.state == "CHANGES_REQUESTED" or .state == "APPROVED")] |
            group_by(.author.login) |
            map(last) |
            map(select(.state == "CHANGES_REQUESTED")) |
            length' 2>/dev/null || echo "0")

          no_changes_requested=$([ "$changes_requested" -eq 0 ] && echo true || echo false)

          # ── Determine target state ──
          # pr-ready requires ALL three conditions
          if [ "$has_any_review" = "true" ] && \
             [ "$no_unresolved_threads" = "true" ] && \
             [ "$no_changes_requested" = "true" ]; then
            target="ready"
          else
            target="in-progress"
          fi

          echo "has_any_review=${has_any_review}" >> "$GITHUB_OUTPUT"
          echo "unresolved_threads=${unresolved_threads}" >> "$GITHUB_OUTPUT"
          echo "no_unresolved_threads=${no_unresolved_threads}" >> "$GITHUB_OUTPUT"
          echo "no_changes_requested=${no_changes_requested}" >> "$GITHUB_OUTPUT"
          echo "target=${target}" >> "$GITHUB_OUTPUT"

          echo "Review status: has_review=${has_any_review} unresolved=${unresolved_threads} changes_requested=$((changes_requested)) -> target=${target}"

      - name: Swap to devin:pr-ready
        if: >-
          steps.pr.outputs.skip != 'true' &&
          steps.status.outputs.target == 'ready' &&
          steps.pr.outputs.current_in_progress == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          issue="${{ steps.pr.outputs.issue_number }}"
          repo="${{ github.repository }}"
          gh issue edit "$issue" --repo "$repo" \
            --remove-label "devin:pr-in-progress" \
            --add-label "devin:pr-ready" 2>/dev/null || true
          echo "Swapped issue #${issue} to devin:pr-ready"

      - name: Revert to devin:pr-in-progress
        if: >-
          steps.pr.outputs.skip != 'true' &&
          steps.status.outputs.target == 'in-progress' &&
          steps.pr.outputs.current_ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          issue="${{ steps.pr.outputs.issue_number }}"
          repo="${{ github.repository }}"
          gh issue edit "$issue" --repo "$repo" \
            --remove-label "devin:pr-ready" \
            --add-label "devin:pr-in-progress" 2>/dev/null || true
          echo "Reverted issue #${issue} to devin:pr-in-progress"
