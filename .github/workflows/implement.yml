name: Implement Pipeline

on:
  issues:
    types: [labeled]

# Prevent concurrent runs for the same issue
concurrency:
  group: issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  # -- devin:implement label added (via UI or slash command) --
  start-implement-session:
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'devin:implement'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add eyes reaction
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions \
            -f content=eyes --silent || true

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx pydantic

      - name: Check for existing active session
        id: check
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
        run: |
          python automation/devin_api.py check-active-session \
            --issue ${{ github.event.issue.number }}

      - name: Skip -- active session already exists
        if: steps.check.outputs.has_active == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "Skipping implement — an active Devin session already exists: ${{ steps.check.outputs.active_session_url }}"

      - name: Fetch issue context
        if: steps.check.outputs.has_active != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json title,body,labels,comments > /tmp/issue_context.json

      - name: Create implement session
        if: steps.check.outputs.has_active != 'true'
        id: session
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          IMPLEMENT_PLAYBOOK_ID: ${{ vars.IMPLEMENT_PLAYBOOK_ID }}
          ACU_LIMIT_IMPLEMENT: ${{ vars.ACU_LIMIT_IMPLEMENT }}
        run: |
          python automation/devin_api.py create-session \
            --stage implement \
            --issue ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --context-file /tmp/issue_context.json

      - name: Rollback -- session creation failed
        if: steps.check.outputs.has_active != 'true' && steps.session.outputs.session_created == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --remove-label "devin:implement" 2>/dev/null || true
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "Failed to create Devin implement session: ${{ steps.session.outputs.session_error }}. The \`devin:implement\` label has been removed. You can retry by adding the label again or using \`/proceed\`."

      - name: Post session link
        if: steps.check.outputs.has_active != 'true' && steps.session.outputs.session_created == 'true' && steps.session.outputs.session_url
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat <<'COMMENT' | sed "s|SESSION_URL|${{ steps.session.outputs.session_url }}|g" > /tmp/implement_comment.md
          ### Devin AI Engineer

          I'm implementing the changes for this issue now. Here's what to expect:

          **I will automatically:**
          - Implement the solution based on the triage analysis
          - Open a pull request when implementation is complete
          - Update the issue with the `devin:pr-opened` label

          **Available commands:**
          - `/close` — Close the issue and terminate the session
          - `/skip` — Skip this issue (stops Devin)
          - `/retriage` — Go back to triage
          - Any other comment will be forwarded to the active Devin session

          **Devin session:** SESSION_URL
          COMMENT
          sed -i 's/^          //' /tmp/implement_comment.md
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body-file /tmp/implement_comment.md
